<!DOCTYPE html>
<html lang="nl-BE">

<head>
    <script src="W2.js" type="module"></script>
    <link rel="stylesheet" href="DCT.css">
</head>

<body>
    <fieldset style="margin-top: 10px;">
    <legend>Wedstrijden: Week 2 (30/03 - 05/04)</legend>
    <form id="dataForm">
        <label for="speler1">Speler 1:</label>
        <input type="text" id="speler1" required>&nbsp;&nbsp;&nbsp;

        <label for="speler2">Speler 2:</label>
        <input type="text" id="speler2" required>&nbsp;&nbsp;&nbsp;

        <label for="datumTijd">Datum:</label>
        <input type="date" id="datumTijd" required>&nbsp;&nbsp;&nbsp;

        <label for="Uur">Uur:</label>
        <input type="time" id="Uur" required>&nbsp;&nbsp;&nbsp;

        <label for="klasse">Klasse:</label>
        <select id="klasse" required>
            <option value="Klasse 1">Klasse 1</option>
            <option value="Klasse 2">Klasse 2</option>
            <option value="Klasse 3">Klasse 3</option>
            <option value="Klasse 4">Klasse 4</option>
            <option value="Klasse 5">Klasse 5</option>
            <option value="Klasse 6">Klasse 6</option>
            <option value="Klasse 7">Klasse 7</option>
            <option value="Klasse 8">Klasse 8</option>
            </select>&nbsp;&nbsp;&nbsp;

            <button type="submit">Toevoegen/Bewerken</button>
        </form>
</fieldset>

<div id="tablesContainer"></div>
</body>
</html>
